version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd FINALS-main && npm install --legacy-peer-deps
    build:
      commands:
        # This CI=false is the magic key that stops AWS from crashing on warnings!
        - cd FINALS-main && CI=false npm run build
  artifacts:
    baseDirectory: FINALS-main/build
    files:
      - '**/*'
  cache:
    paths:
      - FINALS-main/node_modules/**/*