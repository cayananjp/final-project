version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd FINALS-main && npm install --legacy-peer-deps
    build:
      commands:
        # Notice there is no "cd" here! Just the build command.
        - CI=false npm run build
  artifacts:
    baseDirectory: FINALS-main/build
    files:
      - '**/*'
  cache:
    paths:
      - FINALS-main/node_modules/**/*