version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd FINALS-main && npm install --legacy-peer-deps
    build:
      commands:
        - cd FINALS-main && npm run build
  artifacts:
    baseDirectory: FINALS-main/build
    files:
      - '**/*'
  cache:
    paths:
      - FINALS-main/node_modules/**/*